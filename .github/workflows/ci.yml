name: SnowGlobeHQ CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: snowglobe-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate and build HQ
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate

      - name: Build
        run: npm run build

      - name: Verify static app artifacts
        run: |
          test -f dist/index.html
          test -f dist/robots.txt
          test -f dist/_redirects
